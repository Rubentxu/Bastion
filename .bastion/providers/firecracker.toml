# Firecracker microVM provider configuration
# Requires KVM and a kernel + rootfs image

name = "firecracker"
kind = "firecracker"
plugin = "builtin"
default = false
# socket unused for firecracker — binary is auto-detected
image = "bastion/firecracker:latest"
worker_binary = "target/x86_64-unknown-linux-musl/release/bastion-worker"

[capabilities]
supports_snapshots = true
supports_streaming = false
avg_startup_ms = 500
max_memory_mb = 4096
max_cpu_count = 4
requires_kvm = true
