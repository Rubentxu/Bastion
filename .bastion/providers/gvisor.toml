# gVisor provider configuration
# Uses runsc for OCI-compatible sandboxing

name = "gvisor"
kind = "gvisor"
plugin = "builtin"
default = false
# socket unused for gvisor — runsc binary is auto-detected
image = "debian"
worker_binary = "target/release/bastion-worker"

[capabilities]
supports_snapshots = false
supports_streaming = true
avg_startup_ms = 300
max_memory_mb = 8192
max_cpu_count = 8
requires_kvm = false
