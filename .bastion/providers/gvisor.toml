# Embedded default gvisor provider configuration

name = "gvisor"
kind = "gvisor"
plugin = "builtin"
default = false
socket = "/tmp/gvisor.sock"
image = "bastion/gvisor:latest"
worker_binary = "target/debug/bastion-worker"

[capabilities]
supports_snapshots = false
supports_streaming = true
avg_startup_ms = 300
max_memory_mb = 8192
max_cpu_count = 8
requires_kvm = false
