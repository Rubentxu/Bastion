name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Lint + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Check compilation
        run: cargo check --workspace
      
      - name: Lint
        run: cargo clippy --workspace -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace --lib

  integration:
    name: Integration Tests (Podman)
    runs-on: ubuntu-latest
    needs: check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-integration-
      
      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman pull debian:bookworm-slim
      
      - name: Start Podman service
        run: |
          mkdir -p /run/user/$(id -u)/podman
          podman system service --time 3600 unix:///run/user/$(id -u)/podman/podman.sock &
          sleep 3
      
      - name: Run integration tests
        run: cargo test --test podman_lifecycle -- --test-threads=1
