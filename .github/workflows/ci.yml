name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check + Lint + Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
          key: ${{ runner.os }}-rustup-stable-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rustup-stable-

      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Check compilation
        run: cargo check --workspace

      - name: Install wasm32-wasip1 target
        run: rustup target add wasm32-wasip1

      - name: Check enrichment-engine wasm32
        run: cargo check --target wasm32-wasip1 -p enrichment-engine

      - name: Lint
        run: cargo clippy --workspace -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Build debug binaries
        run: |
          cargo build --workspace
          # Verify bastion-worker binary exists
          test -f target/debug/bastion-worker
          test -f target/debug/bastion-gateway

  integration:
    name: Integration Tests (Podman)
    runs-on: ubuntu-latest
    needs: check
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-integration-
      
      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman pull debian:bookworm-slim
      
      - name: Start Podman service
        run: |
          mkdir -p /run/user/$(id -u)/podman
          podman system service --time 3600 unix:///run/user/$(id -u)/podman/podman.sock &
          sleep 3
      
      - name: Run integration tests
        run: cargo test --test podman_lifecycle -- --test-threads=1

      - name: Run gateway E2E tests
        run: cargo test -p bastion-gateway --test e2e_test

      - name: Run worker E2E tests
        run: cargo test --test e2e_worker_v2 -- --test-threads=1
