# Maven Enricher Descriptor
#
# Activates on `mvn` commands and extracts facts about build status,
# test results, artifacts, and error diagnostics.

enricher:
  id: "maven"
  name: "Maven"
  version: "1.0"
  match_patterns:
    - "^mvn\\s+(package|install|verify|test|compile|clean|deploy)"
  template: "Build {{status}}. Artifacts: {{artifacts_count}} JAR(s). Tests: {{tests_run}} run, {{tests_failed}} failed. Coordinates: {{group_id}}:{{artifact_id}}:{{version}}"
  enabled: true
  extractors:
    - id: "build_status"
      type: "regex"
      pattern: "(?P<status>BUILD\\s+(SUCCESS|FAILURE))"
      fact_key: "build_status"
      priority: 1

    - id: "maven_coords"
      type: "regex"
      pattern: "Building\\s+(?P<group_id>[\\w.]+):(?P<artifact_id>[\\w-]+):(?P<version>[\\w.]+)"
      fact_key: "maven_coords"
      priority: 2

    - id: "test_results"
      type: "regex"
      pattern: "Tests run:\\s*(?P<tests_run>\\d+),\\s*Failures:\\s*(?P<tests_failed>\\d+),\\s*Errors:\\s*(?P<tests_errors>\\d+),\\s*Skipped:\\s*(?P<tests_skipped>\\d+)"
      fact_key: "test_results"
      priority: 3

    - id: "jar_artifacts"
      type: "glob"
      pattern: "target/*.jar"
      fact_key: "jar_artifact"
      priority: 4

    - id: "war_artifacts"
      type: "glob"
      pattern: "target/*.war"
      fact_key: "war_artifact"
      priority: 5

    - id: "error_diagnostics"
      type: "regex"
      pattern: "(?P<error_msg>(error|ERROR|compilation failure|COMPILATION ERROR):.*)"
      fact_key: "error_msg"
      priority: 6
