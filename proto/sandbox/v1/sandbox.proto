syntax = "proto3";
package sandbox.v1;

// WorkerAgent runs inside each sandbox (container, VM, etc.)
// The Bastion Gateway connects as a gRPC client.
service WorkerAgent {
  rpc RunCommand (RunCommandRequest) returns (stream RunCommandResponse);
  rpc ReadFile (ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile (WriteFileRequest) returns (WriteFileResponse);
  rpc ListFiles (ListFilesRequest) returns (ListFilesResponse);
  rpc Health (HealthRequest) returns (HealthResponse);
}

message RunCommandRequest {
  string command = 1;
  repeated string args = 2;
  int64 timeout_ms = 3;
}

message RunCommandResponse {
  OutputType type = 1;
  bytes data = 2;

  enum OutputType {
    STDOUT = 0;
    STDERR = 1;
    EXIT_CODE = 2;
  }
}

message ReadFileRequest { string path = 1; }
message ReadFileResponse { bytes content = 1; }

message WriteFileRequest {
  string path = 1;
  bytes content = 2;
}
message WriteFileResponse { int64 bytes_written = 1; }

message ListFilesRequest {
  string directory = 1;
  bool recursive = 2;
}
message ListFilesResponse {
  repeated FileEntry entries = 1;
}
message FileEntry {
  string path = 1;
  bool is_directory = 2;
  int64 size_bytes = 3;
  string permissions = 4;
}

message HealthRequest {}
message HealthResponse {
  string status = 1;
  string version = 2;
}
